<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g-main" x1="118" y1="96" x2="396" y2="416" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1FC59F"/>
      <stop offset="1" stop-color="#4C8FF2"/>
    </linearGradient>
    <linearGradient id="g-soft" x1="166" y1="184" x2="346" y2="322" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8EE5D1" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#9FBEF7" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="g-core" x1="228" y1="228" x2="286" y2="286" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1FC59F"/>
      <stop offset="1" stop-color="#5AA4FF"/>
    </linearGradient>
  </defs>

  <!-- Modern O ring with intentional break -->
  <circle
    cx="256"
    cy="256"
    r="170"
    stroke="url(#g-main)"
    stroke-width="52"
    stroke-linecap="round"
    stroke-dasharray="915 230"
    transform="rotate(-34 256 256)"
  />

  <!-- Oracle "eye" core -->
  <ellipse
    cx="256"
    cy="256"
    rx="106"
    ry="74"
    stroke="url(#g-soft)"
    stroke-width="20"
  />
  <circle cx="256" cy="256" r="28" fill="url(#g-core)"/>
</svg>
